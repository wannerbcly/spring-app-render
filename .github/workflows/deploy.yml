name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true 

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        
        run: |
          git push --force https://oneself11:$HF_TOKEN@huggingface.co/spaces/oneself11/helsinki-spring-app main
